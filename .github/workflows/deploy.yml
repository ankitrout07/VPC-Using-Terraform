name: Deploy Infrastructure and App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Explicit mapping to resolve "Not all values are present" error
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=terraform.tfstate"
        working-directory: ./networking
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Plan & Apply
        run: |
          terraform plan -out=tfplan
          terraform apply -auto-approve tfplan
        working-directory: ./networking
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Get Terraform Outputs
        run: |
          cd ./networking
          echo "RG=$(terraform output -raw resource_group_name)" >> $GITHUB_ENV
          echo "AKS=$(terraform output -raw aks_cluster_name)" >> $GITHUB_ENV
          echo "ACR=$(terraform output -raw acr_login_server)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.ACR }}/fortress-dashboard:${{ github.sha }} ./dashboard

      - name: Login to ACR & Push
        run: |
          ACR_NAME=$(echo ${{ env.ACR }} | cut -d. -f1)
          az acr login --name $ACR_NAME
          docker push ${{ env.ACR }}/fortress-dashboard:${{ github.sha }}

      - name: Deploy to AKS
        run: |
          az aks get-credentials --resource-group ${{ env.RG }} --name ${{ env.AKS }} --overwrite-existing
          sed -i 's|image: .*|image: ${{ env.ACR }}/fortress-dashboard:${{ github.sha }}|' k8s/fortress-app.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/fortress-web --timeout=300s

      - name: Verify Deployment
        run: |
          kubectl get pods -n default
          kubectl get svc -n default
          kubectl get ingress -n default