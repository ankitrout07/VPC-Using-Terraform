name: Terraform-Infra-Pipeline

on:
  push:
    branches: [ main ]
    paths: ['networking/**']
  pull_request:
    branches: [ main ]
    paths: ['networking/**']

env:
  # Senior DevOps Fix: Opt-in to Node 24 and silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./networking
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      # STEP 1: Initialize (This downloads azurerm 3.117.1 to the runner)
      - name: Terraform Init
        run: terraform init

      # STEP 2: Validate (Now the runner has the provider schema)
      - name: Terraform Validate
        id: validate
        run: terraform validate

      # STEP 3: Plan
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      # STEP 4: Apply (Only on merge to main)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan