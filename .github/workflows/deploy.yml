name: Terraform-Infra-Pipeline

on:
  push:
    branches: [ main ]
    paths: ['networking/**']
  pull_request:
    branches: [ main ]
    paths: ['networking/**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./networking
    permissions:
      contents: read
      pull-requests: write  # Needed to post plan comment on PRs

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Setup Terraform ─────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      # ── 3. Init ────────────────────────────────────────────────────────────
      # NOTE: Requires the backend azurerm block in provider.tf to be uncommented
      # and storage_account_name filled in from backend-init outputs.
      - name: Terraform Init
        run: terraform init

      # ── 4. Validate ────────────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── 5. Plan ────────────────────────────────────────────────────────────
      # FIX: Pass db_password from GitHub secret so plan doesn't stall interactively
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true  # Allow the next step to post the result even on failure

      # ── 6. Post Plan to PR ─────────────────────────────────────────────────
      # FIX: Comment the full plan output on the pull request for easy review
      - name: Post Plan Comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('./networking/plan.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n--- Output truncated ---'
              : plan;

            const output = `#### 🔍 Terraform Plan — \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Pushed by @${{ github.actor }}, action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      # Fail the job if plan itself failed (after we've posted the comment)
      - name: Check Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # ── 7. Apply (main branch merges only) ────────────────────────────────
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform apply \
            -auto-approve \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            tfplan